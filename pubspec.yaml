name: ekema
description: EKEMA — Offline-first Intelligent Assistant (Flutter Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  pdf: ^3.10.8
  printing: ^5.11.0
  share_plus: ^7.2.1
  intl: ^0.18.1
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/json/procedures.json
    - assets/json/mock_cni.json
    - assets/json/mock_ens.json
    - assets/map/
